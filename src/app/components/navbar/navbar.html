<header
  [class]="
    'fixed top-0 left-0 right-0 z-50 transition-all duration-300 ' +
    (isScrolled() ? 'bg-white/95 backdrop-blur-sm shadow-md' : 'bg-transparent')
  "
  role="banner"
>
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <a
      href="#inicio"
      class="text-2xl font-bold tracking-tight focus-visible:outline-2 focus-visible:outline-indigo-600 rounded"
      aria-label="Ir al inicio"
    >
      <span class="text-indigo-600">Dev</span><span [class]="isScrolled() ? 'text-gray-900' : 'text-white'">man</span>
    </a>

    <!-- Desktop Navigation -->
    <nav aria-label="Navegación principal" class="hidden md:block">
      <ul class="flex items-center gap-8" role="list">
        @for (item of navItems(); track item.href) {
          <li>
            <a
              [href]="item.href"
              [class]="
                'text-sm font-medium transition-colors hover:text-indigo-600 focus-visible:outline-2 focus-visible:outline-indigo-600 rounded ' +
                (isScrolled() ? 'text-gray-700' : 'text-white/90')
              "
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- CTA Button -->
    <a
      href="#contacto"
      class="hidden md:inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2.5 rounded-full transition-colors focus-visible:outline-2 focus-visible:outline-indigo-600"
    >
      Contáctame
    </a>

    <!-- Mobile Menu Button -->
    <button
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-controls="mobile-menu"
      aria-label="Abrir menú"
      [class]="
        'md:hidden p-2 rounded-lg transition-colors focus-visible:outline-2 focus-visible:outline-indigo-600 ' +
        (isScrolled() ? 'text-gray-700 hover:bg-gray-100' : 'text-white hover:bg-white/10')
      "
    >
      @if (isMenuOpen()) {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      }
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen()) {
    <nav
      id="mobile-menu"
      aria-label="Menú móvil"
      class="md:hidden bg-white border-t border-gray-100 shadow-lg"
    >
      <ul class="flex flex-col py-2" role="list">
        @for (item of navItems(); track item.href) {
          <li>
            <a
              [href]="item.href"
              (click)="closeMenu()"
              class="block px-6 py-3 text-gray-700 text-sm font-medium hover:bg-indigo-50 hover:text-indigo-600 transition-colors focus-visible:outline-2 focus-visible:outline-indigo-600"
            >
              {{ item.label }}
            </a>
          </li>
        }
        <li class="px-6 py-3">
          <a
            href="#contacto"
            (click)="closeMenu()"
            class="inline-flex items-center justify-center w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2.5 rounded-full transition-colors focus-visible:outline-2 focus-visible:outline-indigo-600"
          >
            Contáctame
          </a>
        </li>
      </ul>
    </nav>
  }
</header>
